version: "3.9"

services:
  backend:
    build: ./backend
    container_name: adlab-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/events.db
    networks:
      - adlab-net

  collector:
    build: ./collector
    container_name: adlab-collector
    ports:
      - "5044:5044"   # Winlogbeat -> Logstash
    volumes:
      - ./collector/pipeline:/usr/share/logstash/pipeline
      - ./collector:/usr/share/logstash/testdata
    depends_on:
      - backend
    networks:
      - adlab-net

  dashboard:
    build: ./dashboard
    container_name: adlab-dashboard
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
    networks:
      - adlab-net

networks:
  adlab-net:
    driver: bridge