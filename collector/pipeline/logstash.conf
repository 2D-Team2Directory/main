input {
  beats {
    port => 5044
  }

  file {
    path => "/usr/share/logstash/testdata/sample_events_winlogbeat.jsonl"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
    mode => "read"
  }
}

filter {
  mutate {
    add_field => {
      "event_time_extracted" => "%{@timestamp}"
      "event_id_extracted" => "%{[winlog][event_id]}"
      "provider_extracted" => "%{[winlog][provider_name]}"
      "channel_extracted" => "%{[winlog][channel]}"
      "level_extracted" => "%{[log][level]}"
      "computer_extracted" => "%{[host][name]}"
      "target_host_extracted" => "%{[host][name]}"
    }
  }

  # -----------------------------
  # Security 이벤트 계열
  # -----------------------------
  if [winlog][event_data][TargetUserName] {
    mutate {
      add_field => {
        "target_user_extracted" => "%{[winlog][event_data][TargetUserName]}"
        "username_extracted" => "%{[winlog][event_data][TargetUserName]}"
      }
    }
  }

  if [winlog][event_data][SubjectUserName] {
    mutate {
      replace => { "username_extracted" => "%{[winlog][event_data][SubjectUserName]}" }
    }
  }

  if [winlog][event_data][IpAddress] {
    mutate {
      add_field => { "source_ip_extracted" => "%{[winlog][event_data][IpAddress]}" }
    }
  }

  if [winlog][event_data][LogonType] {
    mutate {
      add_field => { "logon_type_extracted" => "%{[winlog][event_data][LogonType]}" }
    }
  }

  if [winlog][event_data][GroupName] {
    mutate {
      add_field => { "group_name_extracted" => "%{[winlog][event_data][GroupName]}" }
    }
  }

  if [winlog][event_data][ServiceName] {
    mutate {
      add_field => { "service_name_extracted" => "%{[winlog][event_data][ServiceName]}" }
    }
  }

  # -----------------------------
  # Sysmon Event ID 1 - Process Create
  # -----------------------------
  if [winlog][event_data][Image] {
    mutate {
      add_field => { "image_extracted" => "%{[winlog][event_data][Image]}" }
    }
  }

  if [winlog][event_data][CommandLine] {
    mutate {
      add_field => { "command_line_extracted" => "%{[winlog][event_data][CommandLine]}" }
    }
  }

  if [winlog][event_data][ParentImage] {
    mutate {
      add_field => { "parent_image_extracted" => "%{[winlog][event_data][ParentImage]}" }
    }
  }

  if [winlog][event_data][ParentCommandLine] {
    mutate {
      add_field => { "parent_command_line_extracted" => "%{[winlog][event_data][ParentCommandLine]}" }
    }
  }

  if [winlog][event_data][CurrentDirectory] {
    mutate {
      add_field => { "current_directory_extracted" => "%{[winlog][event_data][CurrentDirectory]}" }
    }
  }

  if [winlog][event_data][User] {
    mutate {
      add_field => { "user_extracted" => "%{[winlog][event_data][User]}" }
    }
  }

  # -----------------------------
  # Sysmon Event ID 3 - Network Connection
  # -----------------------------
  if [winlog][event_data][DestinationIp] {
    mutate {
      add_field => { "destination_ip_extracted" => "%{[winlog][event_data][DestinationIp]}" }
    }
  }

  if [winlog][event_data][DestinationPort] {
    mutate {
      add_field => { "destination_port_extracted" => "%{[winlog][event_data][DestinationPort]}" }
    }
  }

  if [winlog][event_data][SourcePort] {
    mutate {
      add_field => { "source_port_extracted" => "%{[winlog][event_data][SourcePort]}" }
    }
  }

  if [winlog][event_data][Protocol] {
    mutate {
      add_field => { "protocol_extracted" => "%{[winlog][event_data][Protocol]}" }
    }
  }

  # -----------------------------
  # Sysmon Event ID 7 - Image Loaded
  # -----------------------------
  if [winlog][event_data][ImageLoaded] {
    mutate {
      add_field => { "image_loaded_extracted" => "%{[winlog][event_data][ImageLoaded]}" }
    }
  }

  if [winlog][event_data][Signed] {
    mutate {
      add_field => { "signed_extracted" => "%{[winlog][event_data][Signed]}" }
    }
  }

  if [winlog][event_data][SignatureStatus] {
    mutate {
      add_field => { "signature_status_extracted" => "%{[winlog][event_data][SignatureStatus]}" }
    }
  }

  if [winlog][event_data][Hashes] {
    mutate {
      add_field => { "hashes_extracted" => "%{[winlog][event_data][Hashes]}" }
    }
  }

  # -----------------------------
  # Sysmon Event ID 11 - File Create
  # -----------------------------
  if [winlog][event_data][TargetFilename] {
    mutate {
      add_field => { "target_filename_extracted" => "%{[winlog][event_data][TargetFilename]}" }
    }
  }

  if [winlog][event_data][CreationUtcTime] {
    mutate {
      add_field => { "creation_utc_time_extracted" => "%{[winlog][event_data][CreationUtcTime]}" }
    }
  }

  # -----------------------------
  # Sysmon Event ID 12 / 13 / 14 - Registry
  # -----------------------------
  if [winlog][event_data][TargetObject] {
    mutate {
      add_field => { "target_object_extracted" => "%{[winlog][event_data][TargetObject]}" }
    }
  }

  if [winlog][event_data][EventType] {
    mutate {
      add_field => { "registry_event_type_extracted" => "%{[winlog][event_data][EventType]}" }
    }
  }

  if [winlog][event_data][Details] {
    mutate {
      add_field => { "details_extracted" => "%{[winlog][event_data][Details]}" }
    }
  }

  # -----------------------------
  # Sysmon Event ID 22 - DNS Query
  # -----------------------------
  if [winlog][event_data][QueryName] {
    mutate {
      add_field => { "query_name_extracted" => "%{[winlog][event_data][QueryName]}" }
    }
  }

  if [winlog][event_data][QueryStatus] {
    mutate {
      add_field => { "query_status_extracted" => "%{[winlog][event_data][QueryStatus]}" }
    }
  }

  if [winlog][event_data][QueryResults] {
    mutate {
      add_field => { "query_results_extracted" => "%{[winlog][event_data][QueryResults]}" }
    }
  }

  ruby {
    code => '
      require "json"
      event.set("raw_json_extracted", event.to_hash.to_json)
    '
  }
}

output {
  http {
    url => "http://backend:8000/events"
    http_method => "post"
    format => "json"
    content_type => "application/json"
    mapping => {
      "event_time" => "%{event_time_extracted}"
      "event_id" => "%{event_id_extracted}"
      "provider" => "%{provider_extracted}"
      "channel" => "%{channel_extracted}"
      "level" => "%{level_extracted}"
      "computer_name" => "%{computer_extracted}"
      "username" => "%{username_extracted}"
      "source_ip" => "%{source_ip_extracted}"
      "target_user" => "%{target_user_extracted}"
      "target_host" => "%{target_host_extracted}"
      "group_name" => "%{group_name_extracted}"
      "logon_type" => "%{logon_type_extracted}"
      "service_name" => "%{service_name_extracted}"
      "message" => "%{message}"
      "raw_json" => "%{raw_json_extracted}"

      # Sysmon Process Create
      "image" => "%{image_extracted}"
      "command_line" => "%{command_line_extracted}"
      "parent_image" => "%{parent_image_extracted}"
      "parent_command_line" => "%{parent_command_line_extracted}"
      "current_directory" => "%{current_directory_extracted}"
      "user" => "%{user_extracted}"

      # Sysmon Network Connection
      "destination_ip" => "%{destination_ip_extracted}"
      "destination_port" => "%{destination_port_extracted}"
      "source_port" => "%{source_port_extracted}"
      "protocol" => "%{protocol_extracted}"

      # Sysmon Image Loaded
      "image_loaded" => "%{image_loaded_extracted}"
      "signed" => "%{signed_extracted}"
      "signature_status" => "%{signature_status_extracted}"
      "hashes" => "%{hashes_extracted}"

      # Sysmon File Create
      "target_filename" => "%{target_filename_extracted}"
      "creation_utc_time" => "%{creation_utc_time_extracted}"

      # Sysmon Registry
      "target_object" => "%{target_object_extracted}"
      "registry_event_type" => "%{registry_event_type_extracted}"
      "details" => "%{details_extracted}"

      # Sysmon DNS Query
      "query_name" => "%{query_name_extracted}"
      "query_status" => "%{query_status_extracted}"
      "query_results" => "%{query_results_extracted}"
    }
  }

  stdout { codec => rubydebug }
}